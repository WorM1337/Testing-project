<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Книга Рецептов</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app-container">
      <header class="header">
        <h1>📖 Книга Рецептов</h1>
        <div id="notification-area" class="notification-area"></div>
      </header>

      <!-- Tabs Navigation -->
      <nav class="tabs" role="tablist">
        <button
          class="tab-btn active"
          data-tab="products"
          onclick="app.switchTab('products')"
        >
          🥦 Продукты
        </button>
        <button
          class="tab-btn"
          data-tab="dishes"
          onclick="app.switchTab('dishes')"
        >
          🍽️ Блюда
        </button>
      </nav>

      <!-- Filters Section -->
      <section class="card filters-section">
        <h2>🔍 Фильтры и поиск</h2>
        <form
          id="filter-form"
          class="filter-grid"
          onsubmit="
            event.preventDefault();
            app.loadData();
          "
        >
          <div class="form-group">
            <label for="filter-search">Поиск по названию</label>
            <input
              type="text"
              id="filter-search"
              placeholder="Введите название..."
            />
          </div>

          <div class="form-group">
            <label for="filter-category">Категория</label>
            <select id="filter-category">
              <option value="">Все категории</option>
            </select>
          </div>

          <div class="form-group">
            <label for="filter-sort">Сортировка</label>
            <select id="filter-sort"></select>
          </div>

          <div class="form-group">
            <label for="filter-order">Порядок</label>
            <select id="filter-order">
              <option value="true">По возрастанию ↑</option>
              <option value="false">По убыванию ↓</option>
            </select>
          </div>

          <div class="form-group flags-filter-group">
            <label>Дополнительные флаги</label>
            <div class="flags-filter">
              <label class="checkbox-label">
                <input type="checkbox" class="flag-filter" value="Vegan" />
                <span>🌱 Веган</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" class="flag-filter" value="GlutenFree" />
                <span>🌾 Без глютена</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" class="flag-filter" value="SugarFree" />
                <span>🍬 Без сахара</span>
              </label>
            </div>
          </div>

          <div class="form-group filter-actions">
            <button type="submit" class="btn btn-primary">Применить</button>
            <button
              type="button"
              class="btn btn-secondary"
              onclick="app.resetFilters()"
            >
              Сброс
            </button>
          </div>
        </form>
      </section>

      <!-- Action Bar -->
      <div class="action-bar">
        <h2 id="list-title">Продукты</h2>
        <button class="btn btn-success" onclick="app.openCreateModal()">
          <span class="btn-icon">+</span> Добавить
        </button>
      </div>

      <!-- Data Table -->
      <div class="card table-card">
        <div class="table-wrapper">
          <table id="data-table">
            <thead>
              <tr id="table-header-row"></tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
        <div id="loading-indicator" class="loading hidden">
          <div class="spinner"></div>
          <span>Загрузка данных...</span>
        </div>
        <div id="empty-state" class="empty-state hidden">
          <span class="empty-icon">📭</span>
          <p>Нет данных для отображения</p>
        </div>
      </div>
    </div>

    <!-- Modal: Create/Edit Entity -->
    <div class="modal-overlay" id="entity-modal">
      <div class="modal modal-large">
        <div class="modal-header">
          <h3 id="modal-title">Создание</h3>
          <button class="btn btn-icon-btn" onclick="app.closeModal()">✕</button>
        </div>
        <form id="entity-form" onsubmit="app.handleFormSubmit(event)">
          <input type="hidden" id="edit-id" />
          <div id="modal-fields" class="form-grid"></div>

          <!-- Ingredients Section (for dishes only) -->
          <div id="ingredients-container" class="ingredients-section hidden">
            <h4>📋 Ингредиенты</h4>
            <div class="ingredients-info">
              <p>
                💡 Выберите продукты из списка. Один продукт можно добавить
                только один раз.
              </p>
            </div>
            <div id="ingredients-list"></div>
            <div class="ingredient-selector">
              <select id="ingredient-product-select" class="form-control">
                <option value="">-- Выберите продукт --</option>
              </select>
              <input
                type="number"
                id="ingredient-amount"
                class="form-control"
                placeholder="Грамм"
                min="1"
                step="1"
              />
              <button
                type="button"
                class="btn btn-primary"
                onclick="app.addIngredient()"
              >
                Добавить
              </button>
            </div>
          </div>

          <div class="modal-actions">
            <button
              type="button"
              class="btn btn-secondary"
              onclick="app.closeModal()"
            >
              Отмена
            </button>
            <button type="submit" class="btn btn-primary">Сохранить</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Modal: View Entity Details -->
    <div class="modal-overlay" id="view-modal">
      <div class="modal modal-medium">
        <div class="modal-header">
          <h3 id="view-modal-title">Просмотр</h3>
          <button class="btn btn-icon-btn" onclick="app.closeViewModal()">
            ✕
          </button>
        </div>
        <div id="view-modal-content" class="view-content"></div>
        <div class="modal-actions">
          <button
            type="button"
            class="btn btn-secondary"
            onclick="app.closeViewModal()"
          >
            Закрыть
          </button>
        </div>
      </div>
    </div>

    <!-- Modal: Image Viewer -->
    <div class="modal-overlay" id="image-modal">
      <div class="modal modal-image">
        <div class="modal-header">
          <h3>Просмотр изображения</h3>
          <button class="btn btn-icon-btn" onclick="app.closeImageModal()">
            ✕
          </button>
        </div>
        <div class="image-viewer">
          <img id="image-viewer-img" src="" alt="Просмотр" />
        </div>
        <div class="image-nav">
          <button
            class="btn btn-secondary"
            id="image-prev"
            onclick="app.navigateImage(-1)"
          >
            ← Назад
          </button>
          <span id="image-counter"></span>
          <button
            class="btn btn-secondary"
            id="image-next"
            onclick="app.navigateImage(1)"
          >
            Вперёд →
          </button>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
